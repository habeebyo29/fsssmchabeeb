<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Contact Us | FSSMC Mosque</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    /* ===== GLOBAL ===== */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Poppins", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f4fff9, #ffffff);
      color: #1f2933;
    }

    /* ===== CONTACT SECTION ===== */
    .contact-section {
      max-width: 760px;
      margin: 90px auto;
      padding: 30px;
      position: relative;
    }

    /* Soft background pattern */
    .contact-section::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, #e6f6ef, transparent 60%),
        radial-gradient(circle at bottom left, #e0f2ea, transparent 55%);
      z-index: -1;
      border-radius: 24px;
    }

    .section-title {
      text-align: center;
      font-size: 2.2rem;
      color: #0f5132;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .section-title span {
      color: #198754;
    }

    .contact-info {
      text-align: center;
      font-size: 1rem;
      color: #4b5563;
      margin-bottom: 45px;
      line-height: 1.9;
    }

    /* ===== FORM CARD ===== */
    .contact-form {
      background: #ffffff;
      padding: 40px;
      border-radius: 22px;
      box-shadow:
        0 20px 40px rgba(15, 81, 50, 0.12),
        inset 0 0 0 1px rgba(25, 135, 84, 0.08);
    }

    /* ===== FORM GROUP ===== */
    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #0f5132;
    }

    /* ===== INPUTS ===== */
    input,
    textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1.5px solid #d1fae5;
      background: #fafffc;
      font-size: 0.95rem;
      transition: all 0.25s ease;
    }

    input::placeholder,
    textarea::placeholder {
      color: #9ca3af;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #198754;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(25, 135, 84, 0.18);
    }

    /* ===== SUBMIT BUTTON ===== */
    .btn-submit {
      width: 100%;
      margin-top: 10px;
      padding: 16px;
      border-radius: 999px;
      background: linear-gradient(135deg, #1fbf8f, #0f5132);
      color: #ffffff;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      border: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 30px rgba(25, 135, 84, 0.35);
    }

    /* ===== FEEDBACK ===== */
    .contact-feedback {
      margin-top: 18px;
      text-align: center;
      font-weight: 600;
    }

    .success {
      color: #198754;
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 24px;
      margin-top: 70px;
      font-size: 0.9rem;
      color: #6b7280;
      border-top: 1px solid #e5f5ee;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .contact-form {
        padding: 28px;
      }

      .section-title {
        font-size: 1.8rem;
      }
    }
  </style>

</head>

<body>
 Actions are judged by intentions. — Sahih al-Bukhari 1
  <!-- ===== CONTACT SECTION ===== -->
  <section class="contact-section" id="contact">
    <h2 class="section-title">📞 Contact Us | اتصل بنا</h2>

    <p class="contact-info">
      📍 123 Mosque Street, City | شارع المسجد ١٢٣، المدينة <br />
      📧 info@fssmc.org | البريد الإلكتروني <br />
      📞 +234 800 123 4567 | الهاتف
    </p>

    <form id="contact-form" class="contact-form">
      <div class="form-group">
        <label for="name">Full Name | الاسم الكامل</label>
        <input type="text" id="name" placeholder="Your Full Name | اسمك الكامل" required />
      </div>

      <div class="form-group">
        <label for="email">Email | البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="example@email.com" required />
      </div>

      <div class="form-group">
        <label for="message">Message | الرسالة</label>
        <textarea id="message" rows="5" placeholder="Write your message | اكتب رسالتك" required></textarea>
      </div>

      <button type="submit" class="btn-submit">
        Send Message | أرسل الرسالة
      </button>

      <p id="contact-feedback" class="contact-feedback"></p>
    </form>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer>
    <div class="footer-bottom">
      &copy; <span id="year"></span> FSSMC Central Mosque | Designed by <strong>Yusuf Habeeb</strong>
    </div>
  </footer>

  <!-- ===== SCRIPT ===== -->
  <script>
    document.getElementById("contact-form").addEventListener("submit", function (e) {
      e.preventDefault();

      const feedback = document.getElementById("contact-feedback");
      feedback.textContent =
        "✅ Message sent successfully! We will contact you soon.";
      feedback.className = "contact-feedback success";

      this.reset();
    });
  </script>

</body>

</html>
